<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Mesajları</title>
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #36393F; /* Dark tema arka plan rengi */
            color: white; /* Yazı rengi */
            padding: 20px;
        }
        #messages {
            border: none;
            padding: 10px;
            height: 550px;
            overflow-y: scroll;
            margin-bottom: 10px;
            background-color: #2F3136; /* Mesaj alanı arka plan rengi */
        }
        #message-input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background-color: #40444B; /* Input alanı arka plan rengi */
            color: white; /* Input yazı rengi */
            border: 1px solid #ccc;
        }
        #send-button {
            padding: 10px 20px;
            background-color: #7289DA; /* Buton rengi */
            color: white; /* Buton yazı rengi */
            border: none;
            cursor: pointer;
        }
        #send-button:hover {
            background-color: #5B6EAE; /* Buton hover rengi */
        }
    </style>
</head>
<body>
    <div id="messages"></div>
    <input id="message" type="text" placeholder="Mesajınızı buraya yazın..." />
    <button id="send-button">Gönder</button>

    <script>
        const socket = io();

        // Yeni mesaj geldiğinde
        socket.on('new_message', function(message_data) {
            const messageElement = document.createElement('div');
            messageElement.innerHTML = `<strong>${message_data.author}</strong>: ${message_data.content}`;
            
            // Eğer mesajda bir medya varsa, HTML içeriği ekle
            if (message_data.content.includes('.jpg') || message_data.content.includes('.png') || message_data.content.includes('.gif')) {
                const img = document.createElement('img');
                img.src = message_data.content; // Mesaj içeriği medya URL'si olarak alınır
                img.style.maxWidth = '100%'; // Resmin genişliğini ayarla
                messageElement.appendChild(img);
            }

            document.getElementById('messages').appendChild(messageElement);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight; // Aşağı kaydır
        });

        // Mesaj gönderme
        document.getElementById('send-button').addEventListener('click', function() {
            const messageContent = document.getElementById('message').value;
            fetch('/send_message', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ content: messageContent })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    console.log('Mesaj gönderildi!');
                    document.getElementById('message').value = ''; // Mesaj kutusunu sıfırla
                } else {
                    console.error('Mesaj gönderilemedi.');
                }
            })
            .catch((error) => {
                console.error('Hata:', error);
            });
        });
    </script>
</body>
</html>
