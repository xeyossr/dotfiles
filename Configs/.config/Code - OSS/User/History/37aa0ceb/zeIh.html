<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Chat</title>
    <link rel="stylesheet" href="style.css"> <!-- CSS dosyanız -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.0/socket.io.min.js"></script>
</head>
<body>
    <div id="chat-window">
        <!-- Mesajlar burada gösterilecek -->
    </div>
    <input type="text" id="message-input" placeholder="Mesaj yaz...">
    <button onclick="sendMessage()">Gönder</button>

    <script>
        const socket = io();

        socket.on('new_message', function(data) {
            const chatWindow = document.getElementById('chat-window');
            const messageElement = document.createElement('div');
            messageElement.innerHTML = `<strong>${data.author.name}</strong>: ${data.content} <img src="${data.author.avatar}" alt="avatar" width="30">`;
            chatWindow.appendChild(messageElement);
            chatWindow.scrollTop = chatWindow.scrollHeight; // En son mesaja kaydır
        });

        function sendMessage() {
            const input = document.getElementById('message-input');
            const message = input.value;
            input.value = '';
            // Burada mesajı botun gönderdiği yere iletebilirsin
        }
    </script>
</body>
</html>
