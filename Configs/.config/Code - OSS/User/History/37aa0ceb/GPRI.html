<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Mesajları</title>
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            padding: 20px;
        }
        #messages {
            border: 1px solid #ccc;
            padding: 10px;
            height: 400px;
            overflow-y: scroll;
            margin-bottom: 10px;
            background-color: white;
        }
        #message-input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>Discord Mesajları</h1>
    <div id="messages"></div>
    <input id="message-input" type="text" placeholder="Mesajınızı buraya yazın..." />
    <button onclick="sendMessage()">Gönder</button>

    <script>
        var socket = io.connect('http://localhost:5000');

        // Web'den mesajı Python backend'e gönderme
        function sendMessage() {
            var channelId = document.getElementById("channel_id").value;
            var message = document.getElementById("message").value;
            socket.emit('send_message', {channel_id: channelId, message: message});
        }

        // Python'dan gelen yeni mesajları web arayüzüne ekle
        socket.on('new_message', function(data) {
            var messagesDiv = document.getElementById("messages");
            var newMessage = document.createElement("p");
            newMessage.textContent = `${data.author}: ${data.content}`;
            messagesDiv.appendChild(newMessage);
        });
    </script>
</body>
</html>
