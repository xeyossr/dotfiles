<!-- botcord-main.html -->
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botcord Main</title>
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <style>
        /* CSS stilleri buraya eklenebilir */
    </style>
</head>
<body>
    <h1>Discord Mesajları</h1>
    <div id="messages"></div>

    <script>
        const socket = io();

        socket.on('new_message', function(message_data) {
            const messageElement = document.createElement('div');
            messageElement.innerHTML = `<strong>${message_data.author.name}</strong>: ${message_data.content} <img src="${message_data.author.avatar}" alt="Avatar" width="30" height="30">`;
            document.getElementById('messages').appendChild(messageElement);
        });
    </script>
</body>
</html>
