<!DOCTYPE html>
<html lang="en">
<head>
    <title>Discord Bot Başlat</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/botcord.css') }}">
</head>
<body>
    <div class="login">
        <h1>Botcord Login</h1>
        <form action="/" method="POST" class="login-form">
            <label for="token">Token:</label><br>
            <input type="text" id="token" name="token" required><br><br>

            <label for="server_id">Server ID:</label><br>
            <input type="text" id="server_id" name="server_id" required><br><br>

            <label for="channel_id">Channel ID:</label><br>
            <input type="text" id="channel_id" name="channel_id" required><br><br>

            <input type="submit" value="Botu Başlat" class="submit">
        </form>
    </div>
</body>
</html>
