<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Bot Başlat</title>
    <link href="botcord.css" type="stylesheet">
</head>
<body>
    <div class="login">
        <h1 style="text-align: center;">Botcord Login</h1>
        <form action="/" method="POST">
            <label for="token">Token:</label><br>
            <input type="text" id="token" name="token" required><br><br>

            <label for="server_id">Server ID:</label><br>
            <input type="text" id="server_id" name="server_id" required><br><br>

            <label for="channel_id">Channel ID:</label><br>
            <input type="text" id="channel_id" name="channel_id" required><br><br>

            <input type="submit" value="Botu Başlat">
        </form>
    </div>
</body>
</html>
