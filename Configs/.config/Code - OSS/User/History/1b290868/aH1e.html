<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitap Listesi</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <h1>Kitap Listesi</h1>

    <!-- Arama kutusu -->
    <div class="search-box">
        <form method="GET" action="/">
            <input type="text" name="query" placeholder="Kitap ara..." value="{{ request.args.get('query', '') }}">
            <button type="submit">Ara</button>
        </form>
    </div>

    <!-- Kitap listesi -->
    <div class="book-list">
        {% for book in books %}
        <div class="book">
            <img src="{{ book[4] }}" alt="Kitap Kapağı">
            <div class="book-details">
                <div class="book-title">{{ book[1] }}</div>
                <div class="book-author">{{ book[2] }}</div>
                <div class="book-description">{{ book[3][:150] }}...</div> <!-- 150 karakter sınırı -->
                <a href="{{ url_for('book_details', book_id=book[0]) }}">Detayları Gör</a>
            </div>
        </div>
        {% else %}
        <p>Hiç kitap bulunamadı.</p>
        {% endfor %}
    </div>
</body>
</html>
