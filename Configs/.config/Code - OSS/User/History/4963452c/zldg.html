<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ book.title }} - Detaylar</title>
</head>
<body>
    <h1>{{ book.title }}</h1>
    <p><strong>Yazar:</strong> {{ book.author }}</p>
    <p><strong>Açıklama:</strong> {{ book.description }}</p>
    <img src="{{ book.cover_image }}" alt="Kitap Kapağı">
    <br>
    <a href="{{ url_for('read_book', book_id=book.id) }}">Kitabı Oku</a>
</body>
</html>
