<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Mesajları</title>
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <script src="../static/js/app.js"></script>
    <link rel="stylesheet" href="../static/css/botcord-main.css">
</head>
<body>
    <div id="server-list" style="position: fixed; left: 0; top: 0; width: 100px; height: 100%; background-color: #2F3136;"></div>
        <!-- Server logoları burada listelenecek -->
    </div>
    
    <div id="messages"></div>
    <div style="display: flex; margin-top: 10px;">
        <input id="message" class="message-input" placeholder="Mesajınızı buraya yazın..." style="flex-grow: 1;"/>
        <button id="send-button">Gönder</button>
    </div>
</body>
</html>
